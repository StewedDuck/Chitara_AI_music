<!DOCTYPE html>
<html>
<head>
    <title>Shared Song</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 text-center">
        <div class="card shadow p-5">
            <h1>{{ song.title }}</h1>
            <audio controls src="{{ song.audio_file }}" class="w-100 my-4"></audio>
            <a href="/" class="btn btn-primary">Create Your Own Music</a>
        </div>
    </div>
</body>
</html>
