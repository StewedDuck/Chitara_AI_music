<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Out - Chitara AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .logout-card { border: none; border-radius: 12px; margin-top: 100px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 text-center">
                <div class="card logout-card shadow p-4">
                    <h3 class="mb-4 fw-bold">Sign Out</h3>
                    <p class="text-muted mb-4">Are you sure you want to sign out of Chitara AI Music?</p>
                    
                    <form method="post" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        {% if redirect_field_value %}
                            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                        {% endif %}
                        
                        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold mb-3 shadow-sm">
                            Yes, Sign Me Out
                        </button>
                        <a href="/" class="btn btn-light w-100 py-2 border">
                            Cancel (Stay Logged In)
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
